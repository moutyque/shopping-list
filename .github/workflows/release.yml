name: Release APK

# Build a signed release APK and publish it as a GitHub Release on every push
# to master. Manual runs are also allowed via the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # required to create the Release and upload the APK

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Exposed so the Firebase step can be skipped until the secret is set
      # (secrets can't be referenced directly in `if:` conditions).
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - run: flutter pub get

      # Quality gate — a broken master never produces a release.
      - run: flutter analyze
      - run: flutter test

      - name: Set up release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
          # Fail fast with a clear message if the secret isn't a valid keystore.
          if ! keytool -list -keystore android/app/release-keystore.jks \
                 -storepass "$STORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::Keystore did not load. Check KEYSTORE_BASE64 (clean, untruncated base64), KEYSTORE_PASSWORD and KEY_ALIAS."
            exit 1
          fi
          cat > android/key.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # build-number drives versionCode, so each build installs over the last.
      - run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Publish GitHub Release (archive)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true

      - name: Distribute to testers (Firebase App Distribution)
        if: env.FIREBASE_APP_ID != ''
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: ${{ github.event.head_commit.message }}
